apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: true
    jsonData:
      timeInterval: 15s

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      maxLines: 5000
      derivedFields:
        - name: TraceID
          matcherRegex: '"traceId":"(\w+)"'
          url: '$${__value.raw}'
          datasourceUid: Tempo

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: true
    editable: true
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: Prometheus
      tracesToLogs:
        datasourceUid: Loki
        tags: ['service', 'container']
        mappedTags:
          - key: service.name
            value: service
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
        filterByTraceID: true
        filterBySpanID: false
      tracesToMetrics:
        datasourceUid: Prometheus
        tags:
          - key: service.name
            value: service
        queries:
          - name: 'Request rate'
            query: 'rate(traces_spanmetrics_calls_total{$$__tags}[5m])'

  - name: Thanos
    type: prometheus
    access: proxy
    url: http://thanos-query:10902
    isDefault: false
    editable: true
    jsonData:
      timeInterval: 15s
