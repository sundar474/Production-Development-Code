apiVersion: 1

datasources:
  # ── Loki (logs) ──────────────────────────────────────────────────────────────
  - name: Loki
    type: loki
    access: proxy
    url: "${LOKI_URL}"
    uid: loki-ds
    isDefault: false
    jsonData:
      maxLines: 5000
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace_id":\s*"([^"]+)"'
          url: "${TEMPO_URL}/d/tempo-ds/tempo?var-traceId=$${__value.raw}"
          datasourceUid: tempo-ds

  # ── Tempo (traces) ────────────────────────────────────────────────────────────
  - name: Tempo
    type: tempo
    access: proxy
    url: "${TEMPO_URL}"
    uid: tempo-ds
    isDefault: false
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: thanos-ds
      nodeGraph:
        enabled: true
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: 1h
        spanEndTimeShift: -1h
      lokiSearch:
        datasourceUid: loki-ds
      tracesToLogs:
        datasourceUid: loki-ds
        mapTagNamesEnabled: true
        mappedTags:
          - key: service.name
            value: app
        filterByTraceID: true
        filterBySpanID: false
      tracesToMetrics:
        datasourceUid: thanos-ds
        tags:
          - key: service.name
            value: service

  # ── Thanos Query (long-term metrics) ──────────────────────────────────────────
  - name: Thanos
    type: prometheus
    access: proxy
    url: "${THANOS_QUERY_URL}"
    uid: thanos-ds
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s
      queryTimeout: 120s
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo-ds
